<style>
:root{--bg:#f3f6fa;--card:#fff;--ink:#162033;--muted:#64748b;--line:#d8e1ec;--blue:#0f6cbd;--green:#11875d;--red:#b42318;--gold:#a15c00}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
header{position:sticky;top:0;background:#f3f6faee;backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:3}
.head{max-width:1050px;margin:auto;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
h1{font-size:22px;margin:0} .ver{font-size:12px;color:var(--muted);font-weight:600}
main{max-width:1050px;margin:18px auto;padding:0 14px 40px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px #0f172a0d}

.btn,button{border:0;border-radius:12px;padding:12px 15px;font-size:16px;font-weight:650;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:46px;cursor:pointer}

.stats{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0} .pill{background:#eef3f8;border-radius:999px;padding:7px 11px;font-size:14px}
.batch{background:#0f172a;color:#e2e8f0;border-radius:14px;padding:14px;min-height:128px;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.6}
.drop{display:block;border:2px dashed #91a4bb;border-radius:15px;padding:25px;text-align:center;background:#f8fafc} .drop input{display:none}
.note{background:#fff7e6;border:1px solid #eed39b;color:#744700;border-radius:12px;padding:12px;line-height:1.65;font-size:14px;margin-top:12px}

</section>

in-right=\"0.7in\" style:print-orientation=\"portrait\" style:print-page-order=\"ttb\" style:first-page-number=\"continue\" style:scale-to=\"100%\" style:table-centering=\"none\" style:print=\"objects charts drawings\"/><style:header-style><style:header-footer-properties fo:min-height=\"0.45in\" fo:margin-left=\"0.7in\" fo:margin-right=\"0.7in\" fo:margin-bottom=\"0in\"/></style:header-style><style:footer-style><style:header-footer-properties fo:min-height=\"0.45in\" fo:margin-left=\"0.7in\" fo:margin-right=\"0.7in\" fo:margin-top=\"0in\"/></style:footer-style></style:page-layout></office:automatic-styles><office:master-styles><style:master-page style:name=\"mp1\" style:page-layout-name=\"pm1\"><style:header/><style:header-left style:display=\"false\"/><style:footer/><style:footer-left style:display=\"false\"/></style:master-page></office:master-styles></office:document-styles>";

function save(){localStorage.setItem(KEY,JSON.stringify(s))}
function load(){
  try{
    const old=JSON.parse(localStorage.getItem(KEY)||"null")||JSON.parse(localStorage.getItem("tw_water_ipad_v1")||"null")||{};
    s={...s,...old};
  }catch(e){}
  document.getElementById("source").value=s.source||"";
  render();
  if(s.results.length)renderResults();
}
function parseLine(l){
  const c=l.toUpperCase().replace(/[\s\-－—–_｜|:：,，;；()（）\[\]【】]/g,"");
  const m=c.match(/[0-9A-Z]{11}/);
  if(!m)return null;
  const p=l.split(/[｜|]/).map(x=>x.trim()).filter(Boolean);
  return{water:m[0],code:p.length>=3?p[0]:"",name:p.length>=3?p[1]:(p.length==2?p[0]:"")};
}
function parseSource(){
  const t=document.getElementById("source").value,a=[],seen=new Set();
  t.split(/\r?\n/).forEach(l=>{const r=parseLine(l);if(r&&!seen.has(r.water)){seen.add(r.water);a.push(r)}});
  s.source=t;s.records=a;s.bi=0;s.done=[];save();render();
}
async function pasteText(){try{document.getElementById("source").value=await navigator.clipboard.readText()}catch(e){alert("請長按文字框後貼上")}}
function currentBatch(){return s.records.slice(s.bi*9,s.bi*9+9)}
function render(){
  const n=Math.ceil(s.records.length/9);
  if(n){
    s.bi=Math.max(0,Math.min(s.bi,n-1));
    document.getElementById("batch").textContent=currentBatch().map((x,i)=>`${i+1}. ${x.water}`).join("\n");
  }else document.getElementById("batch").textContent="尚未整理";
  document.getElementById("valid").textContent="有效 "+s.records.length+" 筆";
  document.getElementById("binfo").textContent=n?"第 "+(s.bi+1)+"／"+n+" 批"+(s.done.includes(s.bi)?"（已查）":""):"第 0／0 批";
  document.getElementById("dinfo").textContent="已查 "+s.done.length+" 批";
  document.getElementById("progressBar").style.width=(n?Math.round(s.done.length/n*100):0)+"%";
  save();
}
function next(){s.bi++;render()} function prev(){s.bi--;render()}
async function copyBatch(){
  const t=currentBatch().map(x=>x.water).join("\n");if(!t)return alert("請先整理名單");
  try{await navigator.clipboard.writeText(t);alert("已複製本批 "+currentBatch().length+" 筆")}catch(e){prompt("長按複製",t)}
}
function done(){if(!s.records.length)return alert("請先整理名單");if(!s.done.includes(s.bi))s.done.push(s.bi);if((s.bi+1)*9<s.records.length)s.bi++;render()}
function resetAll(){if(confirm("確定清除所有資料與進度？")){localStorage.removeItem(KEY);localStorage.removeItem("tw_water_ipad_v1");location.reload()}}

function setCellText(cell,value){
  const TABLE="urn:oasis:names:tc:opendocument:xmlns:table:1.0";
  const OFFICE="urn:oasis:names:tc:opendocument:xmlns:office:1.0";
  const TEXT="urn:oasis:names:tc:opendocument:xmlns:text:1.0";
  cell.removeAttributeNS(TABLE,"number-columns-repeated");
  cell.setAttributeNS(OFFICE,"office:value-type","string");
  while(cell.firstChild)cell.removeChild(cell.firstChild);
  const p=cell.ownerDocument.createElementNS(TEXT,"text:p");
  p.textContent=value||"";
  cell.appendChild(p);
}
function buildODSContent(waters){
  const parser=new DOMParser();
  const doc=parser.parseFromString(ODS_CONTENT,"application/xml");
  if(doc.querySelector("parsererror"))throw new Error("ODS 範本解析失敗");
  const TABLE="urn:oasis:names:tc:opendocument:xmlns:table:1.0";
  const OFFICE="urn:oasis:names:tc:opendocument:xmlns:office:1.0";
  const TEXT="urn:oasis:names:tc:opendocument:xmlns:text:1.0";
  const rows=[...doc.getElementsByTagNameNS(TABLE,"table-row")];
  for(let i=1;i<=9;i++){
    const row=rows[i];
    const old=[...row.children].filter(x=>x.namespaceURI===TABLE&&x.localName==="table-cell");
    while(row.firstChild)row.removeChild(row.firstChild);
    const no=doc.createElementNS(TABLE,"table:table-cell");
    no.setAttributeNS(OFFICE,"office:value-type","float");
    no.setAttributeNS(OFFICE,"office:value",String(i));
    no.setAttributeNS(TABLE,"table:style-name","ce2");
    const p1=doc.createElementNS(TEXT,"text:p");p1.textContent=String(i);no.appendChild(p1);
    const water=doc.createElementNS(TABLE,"table:table-cell");
    water.setAttributeNS(OFFICE,"office:value-type","string");
    water.setAttributeNS(TABLE,"table:style-name","ce2");
    const p2=doc.createElementNS(TEXT,"text:p");p2.textContent=waters[i-1]||"";water.appendChild(p2);
    const note=doc.createElementNS(TABLE,"table:table-cell");
    note.setAttributeNS(OFFICE,"office:value-type","string");
    note.setAttributeNS(TABLE,"table:style-name","ce2");
    note.appendChild(doc.createElementNS(TEXT,"text:p"));
    const tail=doc.createElementNS(TABLE,"table:table-cell");
    tail.setAttributeNS(TABLE,"table:number-columns-repeated","16381");
    row.append(no,water,note,tail);
  }
  return new XMLSerializer().serializeToString(doc);
}
async function downloadBatchODS(){
  const waters=currentBatch().map(x=>x.water);
  if(!waters.length)return alert("請先整理名單");
  if(typeof JSZip==="undefined")return alert("ODS 元件尚未載入，請重新整理頁面");
  try{
    const zip=new JSZip();
    zip.file("mimetype",ODS_MIMETYPE,{compression:"STORE"});
    zip.file("styles.xml",ODS_STYLES);
    zip.file("content.xml",buildODSContent(waters));
    zip.folder("META-INF").file("manifest.xml",ODS_MANIFEST);
    zip.file("meta.xml",ODS_META);
    const blob=await zip.generateAsync({type:"blob",mimeType:ODS_MIMETYPE,compression:"DEFLATE"});
    const a=document.createElement("a");
    const num=String(s.bi+1).padStart(2,"0");
    a.href=URL.createObjectURL(blob);
    a.download=`第${num}批_台水查詢匯入.ods`;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  }catch(err){alert("ODS 產生失敗："+err.message)}
}

function clean(x){return(x||"").toUpperCase().replace(/[^0-9A-Z]/g,"")}
function txt(c){let v="";c.querySelectorAll("p").forEach(p=>v+=p.textContent);return v.trim()}
function rows(xml){
  const ns="urn:oasis:names:tc:opendocument:xmlns:table:1.0",out=[];
  for(const r of [...xml.getElementsByTagNameNS(ns,"table-row")]){
    const vals=[];
    for(const c of [...r.children].filter(x=>x.localName.includes("table-cell"))){
      const q=Math.min(parseInt(c.getAttributeNS(ns,"number-columns-repeated")||"1"),50),v=txt(c);
      for(let i=0;i<q;i++)vals.push(v);
    }
    out.push(vals);
  }
  return out;
}
function stat(r){return r&&((r.status||"").includes("已繳")||r.paid||r.date)?"已繳":"未顯示已繳"}
document.getElementById("file").addEventListener("change",async e=>{
  const f=e.target.files[0];if(!f)return;
  try{
    const z=await JSZip.loadAsync(await f.arrayBuffer());
    const contentFile=z.file("content.xml");if(!contentFile)throw new Error("不是有效的 ODS");
    const x=new DOMParser().parseFromString(await contentFile.async("string"),"application/xml"),rs=rows(x);
    let gs=[],cur=null,head=false;
    for(const r of rs){
      const a=(r[0]||"").trim();
      if(/^水號[:：]/.test(a)){if(cur)gs.push(cur);cur={water:clean(a.replace(/^水號[:：]/,"")),rec:[]};head=false}
      else if(cur&&a==="繳費年月")head=true;
      else if(cur&&head&&/^\d{4}\/\d{1,2}$/.test(a))cur.rec.push({period:a,due:r[3]||"",paid:r[4]||"",date:r[5]||"",status:r[6]||""});
    }
    if(cur)gs.push(cur);
    const map=new Map(s.records.map(r=>[r.water,r]));
    s.results=gs.map(g=>{const q=g.rec.sort((a,b)=>b.period.localeCompare(a.period)).slice(0,2),m=map.get(g.water)||{};return{water:g.water,code:m.code||"",name:m.name||"",r1:q[0]||null,r2:q[1]||null}});
    save();renderResults();
  }catch(err){alert("ODS 讀取失敗："+err.message)}
});
function esc(v){return String(v||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function renderResults(){
  const b=document.getElementById("body");b.innerHTML="";let p=0,u=0;
  s.results.forEach(x=>{
    stat(x.r1)==="已繳"?p++:u++;
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${esc([x.code,x.name].filter(Boolean).join(" "))}</td><td>${x.water}</td><td>${esc(x.r1?.period)}</td><td class="${stat(x.r1)==="已繳"?"ok":"bad"}">${stat(x.r1)}</td><td>${esc(x.r1?.due)}</td><td>${esc(x.r2?.period)}</td><td class="${stat(x.r2)==="已繳"?"ok":"bad"}">${stat(x.r2)}</td><td>${esc(x.r2?.due)}</td>`;
    b.appendChild(tr);
  });
  document.getElementById("rstats").innerHTML=`<span class="pill">共 ${s.results.length} 戶</span><span class="pill">最近一期已繳 ${p}</span><span class="pill">未顯示已繳 ${u}</span>`;
  document.getElementById("wrap").classList.remove("hidden");document.getElementById("csv").classList.remove("hidden");
}
function exportCSV(){
  const a=[["編號","姓名","水號","最近一期","狀態","應繳","前一期","狀態","應繳"]];
  s.results.forEach(x=>a.push([x.code,x.name,x.water,x.r1?.period||"",stat(x.r1),x.r1?.due||"",x.r2?.period||"",stat(x.r2),x.r2?.due||""]));
  const csv="\ufeff"+a.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const l=document.createElement("a");l.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));l.download="台水最近2期.csv";l.click();
}
if("serviceWorker"in navigator&&location.protocol.startsWith("http"))navigator.serviceWorker.register("sw.js");
load();
