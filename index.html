<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>台水查繳費助手 v14</title><script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script><style>
:root{--b:#0f6cbd;--g:#11875d;--bg:#f3f6fa;--line:#d8e1ec;--ink:#162033}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}header{position:sticky;top:0;background:#f3f6faf2;border-bottom:1px solid var(--line);z-index:5}header div,main{max-width:900px;margin:auto}header div{padding:15px}h1{font-size:22px;margin:0}.ver{font-size:13px;color:#64748b}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin:14px 12px}.row{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}button,.btn{border:0;border-radius:12px;padding:12px 14px;font-size:16px;font-weight:750;min-height:46px;background:#e9f2fb;color:#0b5797}.primary{background:var(--b);color:#fff}.green{background:var(--g);color:#fff}.gold{background:#fff0d7;color:#7a4300;text-decoration:none;display:inline-flex;align-items:center}.gray{background:#eef1f5;color:#334155}textarea{width:100%;height:220px;border:1px solid var(--line);border-radius:13px;padding:12px;font-size:15px;line-height:1.45}input[type=file]{display:none}.pick{display:inline-flex;align-items:center}.stats{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.pill{background:#eef3f8;padding:7px 10px;border-radius:999px;font-size:14px}.note{background:#fff7e6;border:1px solid #eed39b;border-radius:12px;padding:11px;color:#744700;line-height:1.5}.batch{background:#0f172a;color:#e2e8f0;border-radius:13px;padding:14px;min-height:110px;white-space:pre-wrap;font:16px ui-monospace,monospace;line-height:1.65}.list{border:1px solid var(--line);border-radius:13px;overflow:hidden}.item{padding:10px;border-bottom:1px solid var(--line);font:17px ui-monospace,monospace}.item:last-child{border:0}@media(max-width:600px){button,.btn{flex:1 1 auto}header div{padding-top:calc(14px + env(safe-area-inset-top))}}
</style></head><body><header><div><h1>💧 台水查繳費助手</h1><div class="ver">v14｜直接讀取全部剪貼簿項目</div></div></header><main>
<section class="card"><h2>1. 匯入捷徑 OCR 文字</h2><textarea id="src" onpaste="nativePaste(event)" placeholder="先按『讀取全部剪貼簿項目』；或在此長按貼上。"></textarea><div class="row"><button class="primary" onclick="readAll()">📋 讀取全部剪貼簿項目</button><button onclick="parse()">整理文字</button><label class="btn gray pick">📄 匯入 TXT<input id="txt" type="file" accept=".txt,text/plain"></label><button class="gray" onclick="clearAll()">清除</button></div><div class="stats"><span class="pill" id="chars">文字 0 字</span><span class="pill" id="clip">剪貼簿 —</span><span class="pill" id="prefix">5M 前綴 0 個</span><span class="pill" id="valid">有效 0 筆</span></div><div class="note">按鈕會使用 <b>navigator.clipboard.read()</b> 逐一讀取 ClipboardItem，再合併所有可讀文字。若 Safari 仍只提供一項，可使用「匯入 TXT」。</div></section>
<section class="card"><h2>2. 水號結果</h2><div id="list" class="list"><div class="item">尚無資料</div></div></section>
<section class="card"><h2>3. 每批 9 筆</h2><div class="stats"><span class="pill" id="batchStat">第 0／0 批</span></div><div id="batch" class="batch">尚無水號</div><div class="row"><button onclick="prev()">上一批</button><button onclick="next()">下一批</button><button class="green" onclick="ods()">📥 下載本批 ODS</button><a class="btn gold" href="https://www.water.gov.tw/ch/EQuery/WaterFeeQuery?nodeId=753" target="_blank">🌐 台水查詢頁</a></div></section>
</main><script>
const S={waters:[],batch:0};const $=x=>document.getElementById(x);function fix(c){return({O:'0',Q:'0',D:'0',I:'1',L:'1',T:'1',Z:'2',S:'5',B:'8',G:'6'}[c]||c)}function norm(t){return String(t||'').normalize('NFKC').toUpperCase().replace(/[Ｍｍ]/g,'M').replace(/[５]/g,'5').replace(/[‐‑‒–—―−﹘﹣－ー]/g,'-')}function body(s){let a=String(s).replace(/[^0-9A-Z]/g,'').split('');if(a.length!==9)return'';for(let i=0;i<8;i++){a[i]=fix(a[i]);if(!/\d/.test(a[i]))return''}a[8]=({O:'0',I:'1',L:'1'}[a[8]]||a[8]);return/[0-9A-Z]/.test(a[8])?a.join(''):''}function lineWater(line){let s=norm(line),d='[0-9OQDILTZSBG]',q='[ \\t\\-:：]*',r=new RegExp('[5S][ \\t]*[MNH]'+q+'('+d+'{2})'+q+'('+d+'{4})'+q+'('+d+'{2})'+q+'([0-9A-Z])'),m=s.match(r);if(m){let b=body(m[1]+m[2]+m[3]+m[4]);if(b)return'5M'+b}let c=s.replace(/[^0-9A-Z]/g,''),n=c.match(/[5S][MNH]([0-9A-Z]{9})/);if(n){let b=body(n[1]);if(b)return'5M'+b}return''}function collect(t){let raw=norm(t),ls=raw.split(/\r\n|\n|\r/),out=[],p=0;for(let i=0;i<ls.length;i++){let has=/[5S][ \\t]*[MNH]/.test(ls[i]);if(has)p++;let w=lineWater(ls[i]);if(!w&&has&&i+1<ls.length)w=lineWater(ls[i]+' '+ls[i+1]);if(w)out.push(w)}return{waters:[...new Set(out)],prefix:p,chars:raw.length}}
async function readAll(){try{if(!navigator.clipboard?.read)throw Error('Safari 不支援 clipboard.read');let items=await navigator.clipboard.read(),parts=[],typeInfo=[];for(let item of items){typeInfo.push(item.types.join(','));let txt='';for(let type of ['text/plain','text/html',...item.types.filter(x=>x.startsWith('text/'))]){if(!item.types.includes(type))continue;try{let blob=await item.getType(type);txt=await blob.text();if(type==='text/html'){let d=new DOMParser().parseFromString(txt,'text/html');txt=d.body.innerText||d.body.textContent||''}if(txt)break}catch{}}if(txt)parts.push(txt)}$('clip').textContent=`剪貼簿 ${items.length} 項／文字 ${parts.length} 段`;$('src').value=parts.join('\n');parse();if($('src').value.length<1000)alert(`Safari 目前只提供 ${$('src').value.length} 字。若原始內容更多，請改用 TXT 匯入。`)}catch(e){alert('讀取失敗：'+e.message+'。請允許貼上，或改用 TXT 匯入。')}}function nativePaste(){setTimeout(parse,0)}function parse(){let r=collect($('src').value);S.waters=r.waters;S.batch=0;$('chars').textContent=`文字 ${r.chars} 字`;$('prefix').textContent=`5M 前綴 ${r.prefix} 個`;$('valid').textContent=`有效 ${r.waters.length} 筆`;render()}function render(){let bs=[];for(let i=0;i<S.waters.length;i+=9)bs.push(S.waters.slice(i,i+9));if(S.batch>=bs.length)S.batch=Math.max(0,bs.length-1);$('list').innerHTML=S.waters.length?S.waters.map((w,i)=>`<div class="item">${i+1}. ${w}</div>`).join(''):'<div class="item">尚無資料</div>';$('batchStat').textContent=`第 ${bs.length?S.batch+1:0}／${bs.length} 批`;$('batch').textContent=bs.length?bs[S.batch].map((w,i)=>`${i+1}. ${w}`).join('\n'):'尚無水號'}function prev(){S.batch=Math.max(0,S.batch-1);render()}function next(){let n=Math.ceil(S.waters.length/9);S.batch=Math.min(Math.max(0,n-1),S.batch+1);render()}function clearAll(){$('src').value='';S.waters=[];S.batch=0;$('clip').textContent='剪貼簿 —';parse()}$('txt').onchange=async e=>{let f=e.target.files[0];if(f){$('src').value=await f.text();$('clip').textContent='TXT 匯入';parse()}e.target.value=''};function dl(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}async function ods(){let rows=S.waters.slice(S.batch*9,S.batch*9+9);if(!rows.length)return alert('本批沒有水號');let content=`<?xml version="1.0" encoding="UTF-8"?><office:document-content xmlns:office="urn:oasis:names:tc:opendocument:xmlns:office:1.0" xmlns:table="urn:oasis:names:tc:opendocument:xmlns:table:1.0" xmlns:text="urn:oasis:names:tc:opendocument:xmlns:text:1.0" office:version="1.2"><office:body><office:spreadsheet><table:table table:name="工作表1"><table:table-row><table:table-cell office:value-type="string"><text:p>No</text:p></table:table-cell><table:table-cell office:value-type="string"><text:p>查詢水號</text:p></table:table-cell></table:table-row>${Array.from({length:9},(_,i)=>`<table:table-row><table:table-cell office:value-type="float" office:value="${i+1}"><text:p>${i+1}</text:p></table:table-cell><table:table-cell office:value-type="string"><text:p>${esc(rows[i]||'')}</text:p></table:table-cell></table:table-row>`).join('')}</table:table></office:spreadsheet></office:body></office:document-content>`;let z=new JSZip();z.file('mimetype','application/vnd.oasis.opendocument.spreadsheet',{compression:'STORE'});z.file('content.xml',content);z.folder('META-INF').file('manifest.xml','<?xml version="1.0" encoding="UTF-8"?><manifest:manifest xmlns:manifest="urn:oasis:names:tc:opendocument:xmlns:manifest:1.0" manifest:version="1.2"><manifest:file-entry manifest:full-path="/" manifest:media-type="application/vnd.oasis.opendocument.spreadsheet"/><manifest:file-entry manifest:full-path="content.xml" manifest:media-type="text/xml"/></manifest:manifest>');dl(await z.generateAsync({type:'blob'}),`台水查詢_第${S.batch+1}批.ods`)}render();
</script></body></html>
