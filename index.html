<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<style>
:root{--bg:#f3f6fa;--card:#fff;--ink:#162033;--muted:#64748b;--line:#d8e1ec;--blue:#0f6cbd;--green:#11875d;--red:#b42318;--gold:#a15c00}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
header{position:sticky;top:0;z-index:5;background:#f3f6faee;backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.head{max-width:1120px;margin:auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
h1{font-size:21px;margin:0}.ver{font-size:12px;color:var(--muted)}
main{max-width:1120px;margin:16px auto;padding:0 12px 50px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 8px 24px #0f172a0d}
h2{font-size:18px;margin:0 0 10px}
.row{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}
button,.btn{border:0;border-radius:12px;padding:11px 14px;font-size:16px;font-weight:700;min-height:45px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.primary{background:var(--blue);color:#fff}.green{background:var(--green);color:#fff}.soft{background:#e9f2fb;color:#0b5797}.gray{background:#eef1f5;color:#334155}.gold{background:#fff0d7;color:#7a4300}.danger{background:#fdecec;color:var(--red)}
input[type=file]{display:none}
.pick{flex:1 1 220px}
.note{background:#fff7e6;border:1px solid #eed39b;color:#744700;border-radius:12px;padding:11px;line-height:1.55;font-size:14px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{background:#eef3f8;border-radius:999px;padding:7px 10px;font-size:14px}
.progress{height:12px;background:#e5eaf0;border-radius:999px;overflow:hidden}.progress>div{height:100%;background:var(--green);width:0;transition:.2s}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.photo{border:1px solid var(--line);border-radius:15px;padding:10px;background:#fff}
.photo img{width:100%;height:180px;object-fit:cover;border-radius:10px;background:#eef1f5}
.small{font-size:13px;color:var(--muted)}
.status{font-weight:800}.ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--gold)}
input[type=text],textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px}
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:13px;max-height:620px}
table{border-collapse:collapse;width:100%;font-size:14px}th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{position:sticky;top:0;background:#f1f5f9}
.batch{background:#0f172a;color:#e2e8f0;border-radius:14px;padding:13px;min-height:90px;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.hidden{display:none!important}
@media(max-width:560px){button,.btn{flex:1 1 auto}.photo img{height:150px}}
.cameraOverlay{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column}
.cameraOverlay.hidden{display:none}
.cameraTop{height:58px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;color:#fff;background:#000}
.cameraView{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
.cameraView video{width:100%;height:100%;object-fit:cover}
.cameraGuide{position:absolute;inset:10% 7%;border:3px solid rgba(255,255,255,.8);border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.18);pointer-events:none}
.cameraHint{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:#000a;color:#fff;padding:7px 11px;border-radius:999px;font-size:13px;white-space:nowrap}
.cameraBottom{padding:14px 16px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-around;background:#000;color:#fff}
.shutter{width:76px;height:76px;border-radius:50%;border:6px solid #fff;background:#ddd;box-shadow:inset 0 0 0 4px #000;padding:0;min-height:0}
.cameraSmall{background:#222;color:#fff;border:1px solid #555}
.cameraCounter{min-width:86px;text-align:center;font-weight:800}
</style>
<link rel="manifest" href="manifest.webmanifest?v=4">
<link rel="apple-touch-icon" href="icon-192.png?v=4">
</head>
<body>
<header><div class="head"><div><h1>📸 台水拍單查繳費助手</h1><div class="ver">v4｜虎尾所專用：只辨識 5M 開頭水號</div></div><button class="gray" onclick="resetAll()">清除全部</button></div></header>

<main>
<section class="card">
<h2>1. 拍照或從相簿選取</h2>
<div class="row">
<button class="btn primary pick" onclick="openLiveCamera()">📷 開啟連續相機</button>
<label class="btn soft pick">🖼️ 相簿一次選很多張<input id="gallery" type="file" accept="image/*" multiple></label>
<label class="btn gray pick">單張相機備用<input id="camera" type="file" accept="image/*" capture="environment"></label>
</div>
<div class="note">虎尾所專用：只抓 5M 開頭、共 11 碼的水號。照片只在你的裝置內處理；拍攝時請讓水號文字清楚、避免反光。</div>
<div class="stats"><span class="pill" id="photoCount">照片 0 張</span><span class="pill" id="ocrCount">已辨識 0 張</span><span class="pill" id="waterCount">有效水號 0 筆</span></div>
<div class="progress"><div id="ocrBar"></div></div>
<div class="row"><button class="green" onclick="startOCR()">🤖 開始批次辨識</button><button class="gray" onclick="stopOCR()">停止</button></div>
</section>

<section class="card">
<h2>2. 照片與辨識結果</h2>
<div id="photoGrid" class="grid"></div>
<div id="emptyPhotos" class="small">尚未加入照片。</div>
</section>

<section class="card">
<h2>3. 水號名單與每 9 筆分批</h2>
<div class="stats"><span class="pill" id="batchInfo">第 0／0 批</span><span class="pill" id="dedupeInfo">去重後 0 筆</span></div>
<div id="batchBox" class="batch">尚無水號</div>
<div class="row"><button class="soft" onclick="prevBatch()">上一批</button><button class="soft" onclick="nextBatch()">下一批</button></div>
<div class="row">
<button class="green" onclick="downloadODS()">📥 下載本批官方 ODS</button>
<a class="btn gold" target="_blank" rel="noopener" href="https://www.water.gov.tw/ch/EQuery/WaterFeeQuery?nodeId=753">🌐 開啟台水查詢頁</a>
</div>
</section>

<section class="card">
<h2>4. 匯入台水查詢結果 ODS</h2>
<label class="btn soft pick">📂 選擇查詢結果 ODS<input id="resultFile" type="file" accept=".ods"></label>
<div id="resultStats" class="stats"></div>
<div id="resultWrap" class="tablewrap hidden">
<table><thead><tr><th>水號</th><th>期別</th><th>狀態</th><th>金額</th><th>銷帳日</th></tr></thead><tbody id="resultBody"></tbody></table>
</div>
<div class="row"><button id="csvBtn" class="soft hidden" onclick="exportCSV()">匯出 CSV</button></div>
</section>
</main>

<div id="cameraOverlay" class="cameraOverlay hidden">
  <div class="cameraTop">
    <button class="cameraSmall" onclick="closeLiveCamera()">完成</button>
    <div>連續拍單</div>
    <button class="cameraSmall" onclick="switchCamera()">切換</button>
  </div>
  <div class="cameraView">
    <video id="liveVideo" autoplay muted playsinline></video>
    <div class="cameraGuide"></div>
    <div class="cameraHint">將整張單子放入框內，拍完可繼續拍</div>
  </div>
  <div class="cameraBottom">
    <div class="cameraCounter" id="liveCount">已拍 0 張</div>
    <button class="shutter" aria-label="拍照" onclick="captureLivePhoto()"></button>
    <button class="cameraSmall" onclick="closeLiveCamera()">完成辨識</button>
  </div>
  <canvas id="cameraCanvas" class="hidden"></canvas>
</div>

<script>
const state={photos:[],batch:0,results:[],stop:false};
let liveStream=null;
let liveFacing="environment";
let liveStartCount=0;
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
function normalizeWater(s){
  let n=String(s||"").toUpperCase()
    .replace(/[Ｍｍ]/g,"M")
    .replace(/[\s\-－—_.,:：;；|｜/\\()[\]{}]/g,"")
    .replace(/[^0-9A-Z]/g,"");
  if(n.length>=2){
    const a=n[0],b=n[1];
    if(/[S５]/.test(a)) n="5"+n.slice(1);
    if(/[NH]/.test(b)) n=n[0]+"M"+n.slice(2);
  }
  return n;
}
function fixWaterCandidate(s){
  let n=normalizeWater(s);
  // 找到最接近 5M 的起點
  let idx=n.indexOf("5M");
  if(idx<0){
    const m=n.match(/[5S][MNH]/);
    if(m) idx=m.index;
  }
  if(idx>=0) n=n.slice(idx);
  if(n.length<11) return "";
  n=n.slice(0,11).split("");
  n[0]="5";
  n[1]="M";
  // 第3～10碼通常為數字：修正常見 OCR 誤判
  for(let i=2;i<=9;i++){
    n[i]=({"O":"0","Q":"0","D":"0","I":"1","L":"1","T":"1","Z":"2","S":"5","B":"8","G":"6"}[n[i]]||n[i]);
    if(!/[0-9]/.test(n[i])) return "";
  }
  // 最後一碼檢號可為英數，只做常見全形/誤判整理
  n[10]=({"O":"0","I":"1","L":"1"}[n[10]]||n[10]);
  const out=n.join("");
  return /^5M[0-9]{8}[0-9A-Z]$/.test(out)?out:"";
}
function findWater(text){
  const raw=String(text||"").toUpperCase()
    .replace(/[Ｍｍ]/g,"M")
    .replace(/[Ｏ]/g,"O")
    .replace(/[ＩＬ]/g,"I")
    .replace(/[５]/g,"5");
  const compact=raw.replace(/[^0-9A-Z]/g,"");
  const candidates=[];

  // 先抓明確的 5M 或常見誤判 SM、5N、5H
  for(const m of compact.matchAll(/[5S][MNH][0-9A-Z]{9,14}/g)){
    candidates.push(m[0]);
  }

  // 再從所有 11～15 碼片段滑動搜尋
  for(let i=0;i<=compact.length-11;i++){
    const piece=compact.slice(i,i+15);
    if(/[5S]/.test(piece[0]) && /[MNH]/.test(piece[1])) candidates.push(piece);
  }

  for(const c of candidates){
    const fixed=fixWaterCandidate(c);
    if(fixed) return fixed;
  }
  return "";
}
async function addFiles(list){
  for(const f of [...list]){
    const url=URL.createObjectURL(f);
    state.photos.push({id:crypto.randomUUID(),file:f,url,text:"",water:"",status:"待辨識",progress:0});
  }
  render();
}
$("camera").addEventListener("change",e=>{addFiles(e.target.files);e.target.value=""});
$("gallery").addEventListener("change",e=>{addFiles(e.target.files);e.target.value=""});
async function openLiveCamera(){
  if(!navigator.mediaDevices?.getUserMedia){
    alert("此瀏覽器不支援網頁連續相機，請改用「單張相機備用」或相簿多選。");
    return;
  }
  if(location.protocol!=="https:" && location.hostname!=="localhost"){
    alert("連續相機需要 HTTPS。請從 GitHub Pages 網址開啟，不要直接開啟本機 HTML。");
    return;
  }
  liveStartCount=state.photos.length;
  $("liveCount").textContent="已拍 0 張";
  $("cameraOverlay").classList.remove("hidden");
  document.body.style.overflow="hidden";
  try{
    await startLiveStream();
  }catch(err){
    closeLiveCamera();
    alert("無法開啟相機："+err.message+"。請到 iPhone「設定 → Safari → 相機」允許使用。");
  }
}
async function startLiveStream(){
  if(liveStream) liveStream.getTracks().forEach(t=>t.stop());
  liveStream=await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:{ideal:liveFacing},
      width:{ideal:1920},
      height:{ideal:2560}
    },
    audio:false
  });
  const video=$("liveVideo");
  video.srcObject=liveStream;
  await video.play();
}
async function switchCamera(){
  liveFacing=liveFacing==="environment"?"user":"environment";
  try{await startLiveStream()}catch(err){alert("切換相機失敗："+err.message)}
}
async function captureLivePhoto(){
  const video=$("liveVideo");
  if(!video.videoWidth){alert("相機尚未準備完成");return}
  const canvas=$("cameraCanvas");
  const maxWidth=1800;
  const scale=Math.min(1,maxWidth/video.videoWidth);
  canvas.width=Math.round(video.videoWidth*scale);
  canvas.height=Math.round(video.videoHeight*scale);
  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const blob=await new Promise(resolve=>canvas.toBlob(resolve,"image/jpeg",0.9));
  if(!blob)return;
  const file=new File([blob],`water-slip-${Date.now()}.jpg`,{type:"image/jpeg"});
  await addFiles([file]);
  const count=state.photos.length-liveStartCount;
  $("liveCount").textContent=`已拍 ${count} 張`;
  if(navigator.vibrate) navigator.vibrate(40);
}
function closeLiveCamera(){
  if(liveStream){liveStream.getTracks().forEach(t=>t.stop());liveStream=null}
  $("liveVideo").srcObject=null;
  $("cameraOverlay").classList.add("hidden");
  document.body.style.overflow="";
  const count=state.photos.length-liveStartCount;
  if(count>0 && confirm(`已拍 ${count} 張。現在開始批次辨識嗎？`)) startOCR();
}
document.addEventListener("visibilitychange",()=>{
  if(document.hidden && liveStream) closeLiveCamera();
});

function render(){
  $("photoCount").textContent=`照片 ${state.photos.length} 張`;
  $("ocrCount").textContent=`已辨識 ${state.photos.filter(p=>p.status==="完成").length} 張`;
  $("waterCount").textContent=`有效水號 ${waters().length} 筆`;
  $("emptyPhotos").classList.toggle("hidden",state.photos.length>0);
  $("photoGrid").innerHTML=state.photos.map((p,i)=>`
  <article class="photo">
    <img src="${p.url}" alt="第${i+1}張">
    <div class="small">第 ${i+1} 張｜<span class="status ${p.status==="完成"?"ok":p.status.includes("找不到")||p.status==="失敗"?"bad":"warn"}">${esc(p.status)}</span> ${p.progress?`(${p.progress}%)`:""}</div>
    <label class="small">辨識水號（可直接修正）</label>
    <input type="text" inputmode="text" maxlength="11" value="${esc(p.water)}"
      placeholder="5MXXXXXXXXX" oninput="editField('${p.id}','water',this.value)">
    <div class="row"><button class="soft" onclick="ocrOne('${p.id}')">重辨識</button><button class="danger" onclick="removePhoto('${p.id}')">刪除</button></div>
  </article>`).join("");
  renderBatch();
}
function editField(id,key,val){const p=state.photos.find(x=>x.id===id);if(p){p.water=normalizeWater(val).slice(0,11);renderBatch()}}
function removePhoto(id){const i=state.photos.findIndex(x=>x.id===id);if(i>=0){URL.revokeObjectURL(state.photos[i].url);state.photos.splice(i,1);render()}}
function waters(){return [...new Set(state.photos.map(p=>fixWaterCandidate(p.water)).filter(Boolean))]}

async function preprocessForWaterOCR(file){
  const bmp=await createImageBitmap(file);
  const maxW=2200;
  const scale=Math.min(1,maxW/bmp.width);
  const canvas=document.createElement("canvas");
  canvas.width=Math.max(1,Math.round(bmp.width*scale));
  canvas.height=Math.max(1,Math.round(bmp.height*scale));
  const ctx=canvas.getContext("2d",{willReadFrequently:true});
  ctx.drawImage(bmp,0,0,canvas.width,canvas.height);
  const im=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=im.data;
  for(let i=0;i<d.length;i+=4){
    const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    const v=g<145?0:g>215?255:Math.max(0,Math.min(255,(g-128)*1.9+128));
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(im,0,0);
  return canvas;
}
async function ocrOne(id){
  const p=state.photos.find(x=>x.id===id); if(!p)return;
  p.status="辨識中";p.progress=0;render();
  try{
    const processed=await preprocessForWaterOCR(p.file);
    const ret=await Tesseract.recognize(processed,"eng",{
      logger:m=>{if(m.status==="recognizing text"){p.progress=Math.round((m.progress||0)*100);render()}},
      tessedit_char_whitelist:"0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      preserve_interword_spaces:"1"
    });
    p.text=ret.data.text||"";
    p.water=findWater(p.text);
    p.status=p.water?"完成":"找不到 5M 水號";
  }catch(e){p.status="失敗";p.text=(p.text||"")+"\n"+e.message}
  p.progress=100;render();
}
async function startOCR(){
  state.stop=false;
  const targets=state.photos.filter(p=>p.status!=="完成");
  for(let i=0;i<targets.length;i++){
    if(state.stop)break;
    await ocrOne(targets[i].id);
    $("ocrBar").style.width=`${Math.round(((i+1)/targets.length)*100)}%`;
  }
}
function stopOCR(){state.stop=true}
function batches(){const w=waters(),out=[];for(let i=0;i<w.length;i+=9)out.push(w.slice(i,i+9));return out}
function renderBatch(){
  const bs=batches();
  if(state.batch>=bs.length)state.batch=Math.max(0,bs.length-1);
  $("batchInfo").textContent=`第 ${bs.length?state.batch+1:0}／${bs.length} 批`;
  $("dedupeInfo").textContent=`去重後 ${waters().length} 筆`;
  $("batchBox").textContent=bs.length?bs[state.batch].map((x,i)=>`${i+1}. ${x}`).join("\n"):"尚無水號";
}
function prevBatch(){state.batch=Math.max(0,state.batch-1);renderBatch()}
function nextBatch(){state.batch=Math.min(Math.max(0,batches().length-1),state.batch+1);renderBatch()}
function xmlEsc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
async function downloadODS(){
  const rows=batches()[state.batch]||[];if(!rows.length){alert("目前沒有可下載的水號");return}
  const content=`<?xml version="1.0" encoding="UTF-8"?>
<office:document-content xmlns:office="urn:oasis:names:tc:opendocument:xmlns:office:1.0" xmlns:table="urn:oasis:names:tc:opendocument:xmlns:table:1.0" xmlns:text="urn:oasis:names:tc:opendocument:xmlns:text:1.0" office:version="1.2"><office:body><office:spreadsheet><table:table table:name="工作表1">
<table:table-row><table:table-cell office:value-type="string"><text:p>No</text:p></table:table-cell><table:table-cell office:value-type="string"><text:p>查詢水號</text:p></table:table-cell></table:table-row>
${Array.from({length:9},(_,i)=>`<table:table-row><table:table-cell office:value-type="float" office:value="${i+1}"><text:p>${i+1}</text:p></table:table-cell><table:table-cell office:value-type="string"><text:p>${xmlEsc(rows[i]||"")}</text:p></table:table-cell></table:table-row>`).join("")}
</table:table></office:spreadsheet></office:body></office:document-content>`;
  const zip=new JSZip();
  zip.file("mimetype","application/vnd.oasis.opendocument.spreadsheet",{compression:"STORE"});
  zip.file("content.xml",content);
  zip.folder("META-INF").file("manifest.xml",`<?xml version="1.0" encoding="UTF-8"?><manifest:manifest xmlns:manifest="urn:oasis:names:tc:opendocument:xmlns:manifest:1.0" manifest:version="1.2"><manifest:file-entry manifest:full-path="/" manifest:media-type="application/vnd.oasis.opendocument.spreadsheet"/><manifest:file-entry manifest:full-path="content.xml" manifest:media-type="text/xml"/></manifest:manifest>`);
  const blob=await zip.generateAsync({type:"blob",mimeType:"application/vnd.oasis.opendocument.spreadsheet"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`台水查詢_第${state.batch+1}批.ods`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
$("resultFile").addEventListener("change",async e=>{
  const f=e.target.files[0];if(!f)return;
  try{
    const zip=await JSZip.loadAsync(f),xml=await zip.file("content.xml").async("string");
    const doc=new DOMParser().parseFromString(xml,"text/xml");
    const rows=[...doc.getElementsByTagNameNS("*","table-row")].map(r=>[...r.getElementsByTagNameNS("*","table-cell")].map(c=>[...c.getElementsByTagNameNS("*","p")].map(p=>p.textContent).join(" ")));
    const flat=rows.map(r=>r.map(x=>x.trim()));
    const out=[];
    for(const r of flat){
      const joined=r.join(" | ");
      const water=findWater(joined);if(!water)continue;
      const status=/已繳|銷帳/.test(joined)?"已繳":/未繳|欠費|應繳/.test(joined)?"未繳":"待確認";
      const amount=(joined.match(/(?:應繳金額|金額)[:：\s]*([\d,]+)/)||[])[1]||"";
      const period=(joined.match(/(20\d{2}[\/\-]\d{1,2}|民國?\s*\d{2,3}[\/\-]\d{1,2})/)||[])[1]||"";
      const paid=(joined.match(/(?:銷帳日|繳費日)[:：\s]*([0-9\/\-]+)/)||[])[1]||"";
      out.push({water,period,status,amount,paid,raw:joined});
    }
    state.results=out;renderResults();
  }catch(err){alert("讀取 ODS 失敗："+err.message)}
});
function renderResults(){
  $("resultStats").innerHTML=`<span class="pill">共 ${state.results.length} 筆</span><span class="pill">已繳 ${state.results.filter(x=>x.status==="已繳").length} 筆</span><span class="pill">未繳 ${state.results.filter(x=>x.status==="未繳").length} 筆</span>`;
  $("resultBody").innerHTML=state.results.map(r=>`<tr><td>${esc(r.water)}</td><td>${esc(r.period)}</td><td class="${r.status==="已繳"?"ok":r.status==="未繳"?"bad":"warn"}">${esc(r.status)}</td><td>${esc(r.amount)}</td><td>${esc(r.paid)}</td></tr>`).join("");
  $("resultWrap").classList.toggle("hidden",!state.results.length);$("csvBtn").classList.toggle("hidden",!state.results.length);
}
function exportCSV(){
  const rows=[["水號","期別","狀態","金額","銷帳日"],...state.results.map(r=>[r.water,r.period,r.status,r.amount,r.paid])];
  const csv="\ufeff"+rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));a.download="台水查繳費結果.csv";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function resetAll(){
  if(!confirm("要清除所有照片與結果嗎？"))return;
  state.photos.forEach(p=>URL.revokeObjectURL(p.url));state.photos=[];state.results=[];state.batch=0;$("ocrBar").style.width="0";render();renderResults();
}
render();renderResults();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs) await r.unregister();
    navigator.serviceWorker.register('./sw.js?v=4').catch(()=>{});
  });
}
</script></body>
