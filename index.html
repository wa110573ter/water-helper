<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f6cbd">
  <title>門牌批次定位導航助手</title>
  <style>
    :root{--b:#0f6cbd;--g:#11875d;--r:#c2410c;--bg:#f3f6fa;--line:#d8e1ec;--ink:#162033;--muted:#64748b}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
    header{position:sticky;top:0;z-index:10;background:#f3f6faf2;border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    header>div,main{max-width:1100px;margin:auto}
    header>div{padding:14px 16px}
    h1{font-size:22px;margin:0}.ver{color:var(--muted);font-size:13px;margin-top:3px}
    .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin:14px 12px;box-shadow:0 2px 8px #0f172a0a}
    h2{font-size:18px;margin:0 0 12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{font-weight:700;font-size:14px}
    input,textarea,select{width:100%;margin-top:5px;border:1px solid #bdc9d8;border-radius:12px;padding:11px;font-size:16px;background:#fff}
    textarea{height:215px;line-height:1.55;resize:vertical}
    .row{display:flex;gap:9px;flex-wrap:wrap;margin-top:11px}
    button,.btn{border:0;border-radius:12px;padding:11px 14px;font-size:15px;font-weight:750;min-height:44px;background:#e9f2fb;color:#0b5797;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    button:disabled{opacity:.5;cursor:not-allowed}
    .primary{background:var(--b);color:#fff}.green{background:var(--g);color:#fff}.orange{background:#ffedd5;color:#9a3412}.gray{background:#eef1f5;color:#334155}
    .note{background:#fff7e6;border:1px solid #eed39b;border-radius:12px;padding:11px;color:#744700;line-height:1.5;font-size:14px}
    .stats{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.pill{background:#eef3f8;padding:7px 10px;border-radius:999px;font-size:14px}
    .progress{height:10px;background:#e7edf4;border-radius:999px;overflow:hidden}.progress>div{height:100%;width:0;background:var(--b);transition:.2s}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:13px}
    table{width:100%;border-collapse:collapse;min-width:950px}
    th,td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left;font-size:14px}
    th{position:sticky;top:0;background:#edf4fb;z-index:1}
    tr.ok{background:#f0fdf4}tr.fail{background:#fff7ed}
    .status{font-weight:700}.small{font-size:12px;color:var(--muted)}
    .nav{white-space:nowrap}.nav a{display:inline-block;padding:7px 9px;border-radius:9px;background:#e8f2ff;color:#075a9c;text-decoration:none;font-weight:700}
    .hide{display:none!important}
    footer{max-width:1100px;margin:15px auto 30px;padding:0 16px;color:var(--muted);font-size:12px}
    @media(max-width:700px){.grid{grid-template-columns:1fr}.card{margin:10px 8px;padding:13px}button,.btn{flex:1 1 auto}header>div{padding-top:calc(13px + env(safe-area-inset-top))}}
  </style>
</head>
<body>
<header><div><h1>📍 門牌批次定位導航助手</h1><div class="ver">TGOS 門牌定位 → WGS84 經緯度 → Google Maps 導航</div></div></header>
<main>
  <section class="card">
    <h2>1. TGOS 金鑰設定</h2>
    <div class="grid">
      <label>APP ID<input id="appId" autocomplete="off" placeholder="貼上 TGOS APP ID"></label>
      <label>API Key<input id="apiKey" type="password" autocomplete="off" placeholder="貼上 TGOS API Key"></label>
    </div>
    <div class="row">
      <button class="primary" onclick="loadTgos()">連線 TGOS</button>
      <button class="gray" onclick="toggleKey()">顯示／隱藏 Key</button>
      <button class="gray" onclick="forgetKey()">清除本機金鑰</button>
    </div>
    <div class="stats"><span class="pill" id="apiState">尚未連線</span></div>
    <div class="note">本工具不把金鑰寫入 ZIP。按「連線 TGOS」後，瀏覽器會記住金鑰。公開部署時，請在 TGOS 後台將金鑰限制為你的 GitHub Pages 網域。</div>
  </section>

  <section class="card">
    <h2>2. 貼上地址資料</h2>
    <textarea id="src" placeholder="每行一筆，可使用以下任一格式：
地址
水號[TAB]姓名[TAB]地址
水號,姓名,地址

例如：
5M912044008	蘇秋菊	雲林縣虎尾鎮新興里新興路76-1號"></textarea>
    <div class="row">
      <button onclick="parseInput()">整理資料</button>
      <button class="gray" onclick="example()">載入範例</button>
      <label class="btn gray">匯入 CSV／TXT<input id="file" type="file" accept=".csv,.txt,text/csv,text/plain" hidden></label>
      <button class="gray" onclick="clearAll()">清除</button>
    </div>
    <div class="stats">
      <span class="pill" id="rowCount">0 筆</span>
      <span class="pill" id="okCount">成功 0</span>
      <span class="pill" id="failCount">待處理 0</span>
    </div>
  </section>

  <section class="card">
    <h2>3. 批次取得經緯度</h2>
    <div class="grid">
      <label>每筆間隔
        <select id="delay"><option value="500">0.5 秒</option><option value="800" selected>0.8 秒</option><option value="1200">1.2 秒</option><option value="2000">2 秒</option></select>
      </label>
      <label>地址前綴（地址未寫縣市時使用）<input id="prefix" value="雲林縣" placeholder="例如：雲林縣"></label>
    </div>
    <div class="row">
      <button class="primary" id="runBtn" onclick="startBatch()">開始批次定位</button>
      <button class="orange" id="stopBtn" onclick="stopBatch()" disabled>停止</button>
      <button onclick="retryFailed()">重試失敗項目</button>
    </div>
    <div class="progress"><div id="bar"></div></div>
    <div class="small" id="progressText" style="margin-top:7px">尚未開始</div>
  </section>

  <section class="card">
    <h2>4. 結果與導航</h2>
    <div class="row">
      <button class="green" onclick="downloadCsv()">下載 CSV</button>
      <button class="green" onclick="downloadKml()">下載 KML</button>
      <button onclick="copyNavLinks()">複製導航連結</button>
    </div>
    <div class="table-wrap" style="margin-top:12px">
      <table>
        <thead><tr><th>#</th><th>水號</th><th>姓名</th><th>輸入地址</th><th>比對地址</th><th>緯度</th><th>經度</th><th>狀態</th><th>導航</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="9">尚無資料</td></tr></tbody>
      </table>
    </div>
  </section>
</main>
<footer>定位結果可能為模糊比對。外勤前請核對「輸入地址」與「比對地址」，不要只看經緯度。</footer>

<script>
const S={rows:[],running:false,stop:false,locator:null};
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clean=s=>String(s??'').normalize('NFKC').replace(/[　]/g,' ').trim();
const csvCell=s=>'"'+String(s??'').replace(/"/g,'""')+'"';

function init(){
  $('appId').value=localStorage.getItem('tgos_appid')||'';
  $('apiKey').value=localStorage.getItem('tgos_apikey')||'';
}
function toggleKey(){$('apiKey').type=$('apiKey').type==='password'?'text':'password'}
function forgetKey(){localStorage.removeItem('tgos_appid');localStorage.removeItem('tgos_apikey');$('appId').value='';$('apiKey').value='';$('apiState').textContent='已清除本機金鑰'}
function loadTgos(){
  const id=$('appId').value.trim(), key=$('apiKey').value.trim();
  if(!id||!key)return alert('請先輸入 APP ID 與 API Key');
  localStorage.setItem('tgos_appid',id); localStorage.setItem('tgos_apikey',key);
  $('apiState').textContent='TGOS 載入中…';
  document.querySelectorAll('script[data-tgos]').forEach(x=>x.remove());
  const s=document.createElement('script'); s.dataset.tgos='1'; s.charset='utf-8';
  s.src='https://api.tgos.tw/TGOS_API/tgos?ver=2&AppID='+encodeURIComponent(id)+'&APIKey='+encodeURIComponent(key)+'&_='+Date.now();
  s.onload=()=>{try{S.locator=new TGOS.TGLocateService();$('apiState').textContent='✅ TGOS 已連線'}catch(e){$('apiState').textContent='❌ TGOS 初始化失敗';alert(e.message)}};
  s.onerror=()=>{$('apiState').textContent='❌ TGOS 載入失敗';alert('TGOS 載入失敗。請檢查金鑰、網站網域授權與網路連線。')};
  document.head.appendChild(s);
}
function splitLine(line){
  let p=line.includes('\t')?line.split('\t'):line.split(',');
  p=p.map(clean).filter((v,i,a)=>v!==''||i<a.length-1);
  if(p.length>=3)return{water:p[0],name:p[1],address:p.slice(2).join(line.includes('\t')?' ':',')};
  if(p.length===2){
    if(/^5[A-Z]/i.test(p[0].replace(/\W/g,'')))return{water:p[0],name:'',address:p[1]};
    return{water:'',name:p[0],address:p[1]};
  }
  return{water:'',name:'',address:clean(line)};
}
function parseInput(){
  const lines=$('src').value.split(/\r?\n/).map(clean).filter(Boolean);
  S.rows=lines.map((line,i)=>({id:i+1,...splitLine(line),matched:'',lat:'',lng:'',status:'待定位',error:''}));
  render();
}
function example(){
  $('src').value='5M912044008\t蘇秋菊\t雲林縣虎尾鎮新興里新興路76-1號\n5M91219300K\t林炳文\t雲林縣虎尾鎮新興里中正路45號\n\t\t雲林縣虎尾鎮新興里新興路50號';
  parseInput();
}
function clearAll(){S.rows=[];$('src').value='';render()}
$('file').onchange=async e=>{const f=e.target.files[0];if(f){$('src').value=await f.text();parseInput()}e.target.value=''};

function normalizedAddress(a){
  let x=clean(a).replace(/\s+/g,'').replace(/台/g,'臺');
  const prefix=clean($('prefix').value);
  if(prefix&&!/^(臺|台)?(北|中|南|東)|^新北|^桃園|^基隆|^新竹|^苗栗|^彰化|^南投|^雲林|^嘉義|^高雄|^屏東|^宜蘭|^花蓮|^澎湖|^金門|^連江/.test(x))x=prefix+x;
  return x;
}
function locateOne(address){
  return new Promise(resolve=>{
    if(!S.locator)return resolve({ok:false,error:'TGOS 尚未連線'});
    const timer=setTimeout(()=>resolve({ok:false,error:'查詢逾時'}),15000);
    try{
      S.locator.locateWGS84({address:normalizedAddress(address)},(results,status)=>{
        clearTimeout(timer);
        try{
          if(status!==TGOS.TGLocatorStatus.OK||!results||!results.length)return resolve({ok:false,error:'查無結果：'+String(status)});
          const r=results[0], p=r.geometry&&r.geometry.location;
          if(!p||!Number.isFinite(Number(p.x))||!Number.isFinite(Number(p.y)))return resolve({ok:false,error:'回傳座標格式異常'});
          resolve({ok:true,lng:Number(p.x),lat:Number(p.y),matched:r.formattedAddress||r.address||''});
        }catch(e){resolve({ok:false,error:e.message})}
      });
    }catch(e){clearTimeout(timer);resolve({ok:false,error:e.message})}
  });
}
async function startBatch(filterFailed=false){
  if(S.running)return;
  if(!S.rows.length)parseInput();
  if(!S.rows.length)return alert('請先貼上地址資料');
  if(!S.locator)return alert('請先按「連線 TGOS」');
  S.running=true;S.stop=false;$('runBtn').disabled=true;$('stopBtn').disabled=false;
  const targets=S.rows.filter(r=>filterFailed?(!r.lat||!r.lng):r.status!=='成功');
  let done=0;
  for(const r of targets){
    if(S.stop)break;
    r.status='查詢中';r.error='';render();
    const out=await locateOne(r.address);
    if(out.ok){Object.assign(r,{lat:out.lat.toFixed(7),lng:out.lng.toFixed(7),matched:out.matched,status:'成功',error:''})}
    else{Object.assign(r,{status:'失敗',error:out.error})}
    done++;$('bar').style.width=(done/targets.length*100)+'%';$('progressText').textContent=`已處理 ${done}／${targets.length}：${r.address}`;
    render(); if(done<targets.length)await sleep(Number($('delay').value));
  }
  S.running=false;$('runBtn').disabled=false;$('stopBtn').disabled=true;
  $('progressText').textContent=S.stop?'已停止，可稍後繼續':'批次定位完成';
}
function stopBatch(){S.stop=true;$('progressText').textContent='正在停止…'}
function retryFailed(){startBatch(true)}
function navUrl(r){return r.lat&&r.lng?'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(r.lat+','+r.lng)+'&travelmode=driving':''}
function render(){
  const ok=S.rows.filter(r=>r.status==='成功').length, fail=S.rows.length-ok;
  $('rowCount').textContent=S.rows.length+' 筆';$('okCount').textContent='成功 '+ok;$('failCount').textContent='待處理 '+fail;
  $('tbody').innerHTML=S.rows.length?S.rows.map((r,i)=>`<tr class="${r.status==='成功'?'ok':r.status==='失敗'?'fail':''}">
  <td>${i+1}</td><td>${esc(r.water)}</td><td>${esc(r.name)}</td><td>${esc(r.address)}</td><td>${esc(r.matched)}</td>
  <td>${esc(r.lat)}</td><td>${esc(r.lng)}</td><td><span class="status">${esc(r.status)}</span>${r.error?'<div class="small">'+esc(r.error)+'</div>':''}</td>
  <td class="nav">${navUrl(r)?'<a target="_blank" rel="noopener" href="'+navUrl(r)+'">Google Maps</a>':'—'}</td></tr>`).join(''):'<tr><td colspan="9">尚無資料</td></tr>';
}
function download(data,name,type){const b=new Blob([data],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function downloadCsv(){
  if(!S.rows.length)return alert('沒有資料');
  const head=['順序','水號','姓名','輸入地址','比對地址','緯度','經度','狀態','Google Maps導航'];
  const rows=S.rows.map((r,i)=>[i+1,r.water,r.name,r.address,r.matched,r.lat,r.lng,r.status,navUrl(r)]);
  download('\ufeff'+[head,...rows].map(x=>x.map(csvCell).join(',')).join('\r\n'),'門牌定位結果.csv','text/csv;charset=utf-8');
}
function downloadKml(){
  const rows=S.rows.filter(r=>r.lat&&r.lng);if(!rows.length)return alert('尚無成功定位資料');
  const xml=`<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>門牌定位結果</name>${rows.map((r,i)=>`<Placemark><name>${esc((i+1)+'. '+(r.name||r.address))}</name><description><![CDATA[水號：${r.water}<br>輸入地址：${r.address}<br>比對地址：${r.matched}]]></description><Point><coordinates>${r.lng},${r.lat},0</coordinates></Point></Placemark>`).join('')}</Document></kml>`;
  download(xml,'門牌定位結果.kml','application/vnd.google-earth.kml+xml;charset=utf-8');
}
async function copyNavLinks(){
  const text=S.rows.filter(r=>navUrl(r)).map((r,i)=>`${i+1}. ${r.name||r.address}\n${navUrl(r)}`).join('\n\n');
  if(!text)return alert('尚無成功定位資料');
  try{await navigator.clipboard.writeText(text);alert('已複製導航連結')}catch{prompt('請複製以下內容',text)}
}
init();render();
</script>
</body></html>
