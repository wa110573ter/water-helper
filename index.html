<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f6cbd"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="繳費查詢"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><title>台水繳費查詢助手</title><script src="jszip.min.js"></script><style>
:root{--bg:#f3f6fa;--card:#fff;--ink:#162033;--muted:#64748b;--line:#d8e1ec;--blue:#0f6cbd;--green:#11875d;--red:#b42318}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}header{position:sticky;top:0;background:#f3f6faee;backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:3}.head{max-width:1050px;margin:auto;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}h1{font-size:22px;margin:0}main{max-width:1050px;margin:18px auto;padding:0 14px 40px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px #0f172a0d}h2{font-size:19px;margin:0 0 12px}textarea{width:100%;min-height:170px;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px;line-height:1.55}.row{display:flex;gap:9px;flex-wrap:wrap;margin-top:11px}.btn,button{border:0;border-radius:12px;padding:12px 15px;font-size:16px;font-weight:650;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:46px}.primary{background:var(--blue);color:#fff}.green{background:var(--green);color:#fff}.soft{background:#e9f2fb;color:#0b5797}.gray{background:#eef1f5;color:#334155}.stats{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.pill{background:#eef3f8;border-radius:999px;padding:7px 11px;font-size:14px}.batch{background:#0f172a;color:#e2e8f0;border-radius:14px;padding:14px;min-height:128px;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.6}.drop{display:block;border:2px dashed #91a4bb;border-radius:15px;padding:25px;text-align:center;background:#f8fafc}.drop input{display:none}.note{background:#fff7e6;border:1px solid #eed39b;color:#744700;border-radius:12px;padding:12px;line-height:1.65;font-size:14px;margin-top:12px}.tablewrap{overflow:auto;max-height:570px;border:1px solid var(--line);border-radius:13px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;vertical-align:top}th{background:#f1f5f9;position:sticky;top:0}.ok{color:var(--green);font-weight:750}.bad{color:var(--red);font-weight:750}.hidden{display:none}@media(min-width:800px){.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}.card{margin-bottom:0}}
</style></head><body><header><div class="head"><h1>💧 台水繳費查詢助手</h1><button class="gray" onclick="resetAll()">清除</button></div></header><main><div class="grid">
<section class="card"><h2>1. 貼上名單</h2><textarea id="source" placeholder="D2-16｜莊宜馨｜5M935233346"></textarea><div class="row"><button class="primary" onclick="parseSource()">整理名單</button><button class="soft" onclick="pasteText()">貼上剪貼簿</button></div><div class="stats"><span class="pill" id="valid">有效 0 筆</span><span class="pill" id="binfo">第 0／0 批</span></div></section>
<section class="card"><h2>2. 每批 9 筆</h2><div class="batch" id="batch">尚未整理</div><div class="row"><button class="soft" onclick="prev()">上一批</button><button class="soft" onclick="next()">下一批</button><button class="primary" onclick="copyBatch()">複製本批</button></div><div class="row"><a class="btn green" target="_blank" href="https://www.water.gov.tw/ch/EQuery/WaterFeeQuery?nodeId=753">開啟台水查詢頁</a><button class="gray" onclick="done()">標記已查</button></div><div class="note">iPad Safari 不能讓一般網頁直接控制台水網站。請複製本批後，到台水頁面貼入並輸入驗證碼。進度會保留在裝置。</div></section>
<section class="card full"><h2>3. 匯入台水 ODS，整理最近 2 期</h2><label class="drop"><input id="file" type="file" accept=".ods"><b>點這裡選擇 ODS</b><br>iPad 會開啟「檔案」App</label><div class="stats" id="rstats"></div><div class="tablewrap hidden" id="wrap"><table><thead><tr><th>編號／姓名</th><th>水號</th><th>最近一期</th><th>狀態</th><th>應繳</th><th>前一期</th><th>狀態</th><th>應繳</th></tr></thead><tbody id="body"></tbody></table></div><div class="row"><button id="csv" class="soft hidden" onclick="exportCSV()">匯出 CSV</button></div></section>
</div></main><script>
const KEY="tw_water_ipad_v1";let s={source:"",records:[],bi:0,done:[],results:[]};function save(){localStorage.setItem(KEY,JSON.stringify(s))}function load(){try{s={...s,...JSON.parse(localStorage.getItem(KEY)||"{}")}}catch(e){}document.getElementById("source").value=s.source||"";render();if(s.results.length)renderResults()}
function parseLine(l){const c=l.toUpperCase().replace(/[\s\-－—–_｜|:：,，;；()（）\[\]【】]/g,""),m=c.match(/[0-9A-Z]{11}/);if(!m)return null;const p=l.split(/[｜|]/).map(x=>x.trim()).filter(Boolean);return{water:m[0],code:p.length>=3?p[0]:"",name:p.length>=3?p[1]:(p.length==2?p[0]:"")}}
function parseSource(){const t=document.getElementById("source").value,a=[],seen=new Set();t.split(/\r?\n/).forEach(l=>{const r=parseLine(l);if(r&&!seen.has(r.water)){seen.add(r.water);a.push(r)}});s.source=t;s.records=a;s.bi=0;s.done=[];save();render()}
async function pasteText(){try{document.getElementById("source").value=await navigator.clipboard.readText()}catch(e){alert("請長按文字框後貼上")}}
function render(){const n=Math.ceil(s.records.length/9);if(n){s.bi=Math.max(0,Math.min(s.bi,n-1));document.getElementById("batch").textContent=s.records.slice(s.bi*9,s.bi*9+9).map(x=>x.water).join("\n")}else document.getElementById("batch").textContent="尚未整理";document.getElementById("valid").textContent="有效 "+s.records.length+" 筆";document.getElementById("binfo").textContent=n?"第 "+(s.bi+1)+"／"+n+" 批"+(s.done.includes(s.bi)?"（已查）":""):"第 0／0 批";save()}
function next(){s.bi++;render()}function prev(){s.bi--;render()}async function copyBatch(){const t=s.records.slice(s.bi*9,s.bi*9+9).map(x=>x.water).join("\n");if(!t)return alert("請先整理");try{await navigator.clipboard.writeText(t);alert("已複製")}catch(e){prompt("長按複製",t)}}function done(){if(!s.done.includes(s.bi))s.done.push(s.bi);if((s.bi+1)*9<s.records.length)s.bi++;render()}
function resetAll(){if(confirm("確定清除所有資料？")){localStorage.removeItem(KEY);location.reload()}}
function clean(x){return(x||"").toUpperCase().replace(/[^0-9A-Z]/g,"")}function txt(c){let v="";c.querySelectorAll("p").forEach(p=>v+=p.textContent);return v.trim()}
function rows(xml){const ns="urn:oasis:names:tc:opendocument:xmlns:table:1.0",out=[];for(const r of [...xml.getElementsByTagNameNS(ns,"table-row")]){const vals=[];for(const c of [...r.children].filter(x=>x.localName.includes("table-cell"))){const q=Math.min(parseInt(c.getAttributeNS(ns,"number-columns-repeated")||"1"),50),v=txt(c);for(let i=0;i<q;i++)vals.push(v)}out.push(vals)}return out}
function stat(r){return r&&((r.status||"").includes("已繳")||r.paid||r.date)?"已繳":"未顯示已繳"}
document.getElementById("file").addEventListener("change",async e=>{const f=e.target.files[0];if(!f)return;try{const z=await JSZip.loadAsync(await f.arrayBuffer()),x=new DOMParser().parseFromString(await z.file("content.xml").async("string"),"application/xml"),rs=rows(x);let gs=[],cur=null,head=false;for(const r of rs){const a=(r[0]||"").trim();if(/^水號[:：]/.test(a)){if(cur)gs.push(cur);cur={water:clean(a.replace(/^水號[:：]/,"")),rec:[]};head=false}else if(cur&&a==="繳費年月")head=true;else if(cur&&head&&/^\d{4}\/\d{1,2}$/.test(a))cur.rec.push({period:a,due:r[3]||"",paid:r[4]||"",date:r[5]||"",status:r[6]||""})}if(cur)gs.push(cur);const map=new Map(s.records.map(r=>[r.water,r]));s.results=gs.map(g=>{const q=g.rec.sort((a,b)=>b.period.localeCompare(a.period)).slice(0,2),m=map.get(g.water)||{};return{water:g.water,code:m.code||"",name:m.name||"",r1:q[0]||null,r2:q[1]||null}});save();renderResults()}catch(err){alert("ODS 讀取失敗："+err.message)}})
function esc(v){return String(v||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}function renderResults(){const b=document.getElementById("body");b.innerHTML="";let p=0,u=0;s.results.forEach(x=>{stat(x.r1)==="已繳"?p++:u++;const tr=document.createElement("tr");tr.innerHTML=`<td>${esc([x.code,x.name].filter(Boolean).join(" "))}</td><td>${x.water}</td><td>${esc(x.r1?.period)}</td><td class="${stat(x.r1)==="已繳"?"ok":"bad"}">${stat(x.r1)}</td><td>${esc(x.r1?.due)}</td><td>${esc(x.r2?.period)}</td><td class="${stat(x.r2)==="已繳"?"ok":"bad"}">${stat(x.r2)}</td><td>${esc(x.r2?.due)}</td>`;b.appendChild(tr)});document.getElementById("rstats").innerHTML=`<span class="pill">共 ${s.results.length} 戶</span><span class="pill">最近一期已繳 ${p}</span><span class="pill">未顯示已繳 ${u}</span>`;document.getElementById("wrap").classList.remove("hidden");document.getElementById("csv").classList.remove("hidden")}
function exportCSV(){const a=[["編號","姓名","水號","最近一期","狀態","應繳","前一期","狀態","應繳"]];s.results.forEach(x=>a.push([x.code,x.name,x.water,x.r1?.period||"",stat(x.r1),x.r1?.due||"",x.r2?.period||"",stat(x.r2),x.r2?.due||""]));const csv="\ufeff"+a.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n"),l=document.createElement("a");l.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));l.download="台水最近2期.csv";l.click()}
if("serviceWorker"in navigator&&location.protocol.startsWith("http"))navigator.serviceWorker.register("sw.js");load();
</script></body></html>
